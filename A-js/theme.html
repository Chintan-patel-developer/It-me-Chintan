<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
      <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
      <style>
            .container{
                  border: black 1px solid;
                  display: flex;
                  flex-direction: row-reverse;
                  justify-content: center;
                  align-items: center;
            }
            section{
                  width: 100%;
                  height: 100vh;
            }
      </style>
      <script>
            var x = angular.module("app1", []);
            x.controller("theme", function ($scope) {

                  $scope.color = function (value) {
                        $scope.ans = value;
                  };
                  
            });
      </script>
</head>
<body ng-app="app1" ng-controller="theme">
            <section style="background: {{ans}};">
                 
                  <h1 >Welcome to <span ng-bind="ans"></span></h1>
                  <div class="container">
                        <div class="row">
                              <div class="col">
                                    <input type=button value="red" ng-click="color('red')">
                                    <input type=button value="blue" ng-click="color('blue')">
                                    <input type=button value="green"  ng-click ="color('green')">
                              </div>
                        </div>
                  </div>
            </section>
</body>
</html>
